server {
    listen 80;
    server_name resource.skandstudio.com;

    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name resource.skandstudio.com;

    # SSL certificates - BaoTa will fill these when you apply for SSL
    # ssl_certificate    /www/server/panel/vhost/cert/resource.skandstudio.com/fullchain.pem;
    # ssl_certificate_key /www/server/panel/vhost/cert/resource.skandstudio.com/privkey.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1000;

    # Max upload size
    client_max_body_size 10m;

    # Static files - served directly by Nginx (faster)
    location ~* \.(css|js|svg|png|jpg|jpeg|gif|ico|woff2?|ttf)$ {
        root /www/wwwroot/resource.skandstudio.com/public;
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri @backend;
    }

    # API and all other requests -> Node.js
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;
    }

    location @backend {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Block access to sensitive files
    location ~ /\. {
        deny all;
    }
    location ~* \.(db|sqlite|sqlite3)$ {
        deny all;
    }
}
